  <noscript>
    <style>
      body { background: #0a0e27; color: #ff1744; }
      body::after {
        content: 'JavaScript is required to play NETRUNNER';
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-size: 20px; text-align: center; z-index: 10000;
      }
    </style>
  </noscript>
  <script>
    // Check auth on page load
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const authToken = urlParams.get('auth');
      const user = urlParams.get('user');

      if (!authToken) {
        // No auth token, redirect to login page
        // Check if token is in localStorage
        const savedToken = localStorage.getItem('netrunner_access_token');
        if (!savedToken) {
          window.location.href = '/auth.html';
          return;
        }
      } else {
        // Store auth from URL
        localStorage.setItem('netrunner_access_token', authToken);
        if (user) {
          localStorage.setItem('netrunner_user', user);
        }
        // Clean up URL
        window.history.replaceState({}, document.title, '/index.html');
      }
    })();
  </script>

  <!-- Auth Handler -->
  <script>
    // Initialize user profile display and logout handler
    window.gameAuthState = {
      accessToken: localStorage.getItem('netrunner_access_token'),
      user: null
    };

    function initAuthUI() {
      const userDisplay = document.getElementById('user-display');
      const userProfile = document.getElementById('user-profile');
      const logoutBtn = document.getElementById('logout-btn');

      if (gameAuthState.accessToken) {
        try {
          const userStr = localStorage.getItem('netrunner_user');
          if (userStr) {
            gameAuthState.user = JSON.parse(userStr);
            userDisplay.textContent = gameAuthState.user.username || 'Player';
            userProfile.style.display = 'block';
          }
        } catch (e) {
          console.error('Error parsing user data:', e);
        }
      }

      if (logoutBtn) {
        logoutBtn.addEventListener('click', handleLogout);
      }
    }

    async function handleLogout() {
      // Call logout endpoint to invalidate session
      const token = gameAuthState.accessToken;
      if (token) {
        try {
          const host = window.location.hostname || 'localhost';
          const protocol = window.location.protocol === 'file:' ? 'http:' : window.location.protocol;
          const apiHost = host === 'localhost' || host === '127.0.0.1' ? 'localhost:3000' : `${host}:3000`;
          await fetch(`${protocol}//${apiHost}/api/auth/logout`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          });
        } catch (e) {
          console.error('Logout error:', e);
        }
      }

      // Clear localStorage
      localStorage.removeItem('netrunner_access_token');
      localStorage.removeItem('netrunner_refresh_token');
      localStorage.removeItem('netrunner_user');

      // Redirect to login
      window.location.href = '/auth.html';
    }

    // Initialize auth UI when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAuthUI);
    } else {
      initAuthUI();
    }
  </script>
