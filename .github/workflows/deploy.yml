name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # Job 1: Deploy to Production
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Deploy notification
        run: |
          echo "✅ Deployment to production starting..."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY

      - name: Log deployment metadata
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Actor: ${{ github.actor }}"
          echo "Ref: ${{ github.ref }}"
          echo "Commit SHA: ${{ github.sha }}"

  # Job 2: Post-Deployment Notification
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    name: Notify Deployment
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "The game is ready for production access"
            echo "Repository: github.com/nicthegarden/netrunner"
            echo "Branch: main"
          else
            echo "❌ Deployment failed!"
            echo "Check the logs above for details"
          fi