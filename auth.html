<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NETRUNNER — Login</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* Auth page styles */
    #auth-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
      z-index: 10000;
    }

    #auth-modal {
      background: #0f1419;
      border: 2px solid #00ff41;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      color: #00ff41;
      font-size: 28px;
      margin: 0 0 10px 0;
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
    }

    .auth-header p {
      color: #00d4ff;
      font-size: 12px;
      margin: 0;
      letter-spacing: 2px;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #00ff41;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      background: #1a1f3a;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .form-group input::placeholder {
      color: #00ff4166;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #00ff41;
    }

    .checkbox-group label {
      margin: 0;
      color: #00ff41;
      font-size: 12px;
      cursor: pointer;
      flex: 1;
    }

    .form-error {
      color: #ff1744;
      font-size: 12px;
      margin-bottom: 15px;
      text-align: center;
      min-height: 16px;
    }

    .form-loading {
      color: #00d4ff;
      font-size: 12px;
      margin-bottom: 15px;
      text-align: center;
      min-height: 16px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn-auth {
      flex: 1;
      padding: 12px;
      background: #00ff41;
      border: none;
      color: #0a0e27;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
      border-radius: 4px;
    }

    .btn-auth:hover:not(:disabled) {
      background: #00d4ff;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
    }

    .btn-auth:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-toggle-form {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid #00ff41;
      color: #00ff41;
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    .btn-toggle-form:hover {
      background: #00ff4111;
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
    }

    .auth-footer {
      text-align: center;
      color: #00d4ff;
      font-size: 11px;
      margin-top: 20px;
      line-height: 1.6;
    }

    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #00ff41;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      #auth-modal {
        padding: 30px 20px;
        max-width: 90%;
      }

      .auth-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="auth-container">
    <div id="auth-modal">
      <div class="auth-header">
        <h1>⚡ NETRUNNER</h1>
        <p>CYBERPUNK IDLE RPG</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form active">
        <div class="form-error" id="login-error"></div>
        <div class="form-loading" id="login-loading"></div>

        <div class="form-group">
          <label for="login-username">Username</label>
          <input 
            id="login-username" 
            type="text" 
            placeholder="Enter your username"
            required 
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input 
            id="login-password" 
            type="password" 
            placeholder="Enter your password"
            required 
            autocomplete="current-password"
          />
        </div>

        <div class="checkbox-group">
          <input id="remember-me" type="checkbox" />
          <label for="remember-me">Remember me (30 days)</label>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn-auth" id="login-submit">Log In</button>
        </div>

        <button type="button" class="btn-toggle-form" onclick="toggleAuthForm()">
          Don't have an account? Register
        </button>
      </form>

      <!-- Registration Form -->
      <form id="register-form" class="auth-form">
        <div class="form-error" id="register-error"></div>
        <div class="form-loading" id="register-loading"></div>

        <div class="form-group">
          <label for="register-username">Username</label>
          <input 
            id="register-username" 
            type="text" 
            placeholder="Choose a username (3-32 chars)"
            required 
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="register-password">Password</label>
          <input 
            id="register-password" 
            type="password" 
            placeholder="Enter a password (6+ chars)"
            required 
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <label for="register-password-confirm">Confirm Password</label>
          <input 
            id="register-password-confirm" 
            type="password" 
            placeholder="Confirm your password"
            required 
            autocomplete="new-password"
          />
        </div>

        <div class="btn-group">
          <button type="submit" class="btn-auth" id="register-submit">Create Account</button>
        </div>

        <button type="button" class="btn-toggle-form" onclick="toggleAuthForm()">
          Already have an account? Log In
        </button>
      </form>

      <div class="auth-footer">
        <p>💾 Your progress is saved automatically</p>
        <p>🔒 Accounts are free and account data is private</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = (() => {
      const host = window.location.hostname || 'localhost';
      const protocol = window.location.protocol === 'file:' ? 'http:' : window.location.protocol;
      const apiHost = host === 'localhost' || host === '127.0.0.1' ? 'localhost:3000' : `${host}:3000`;
      return `${protocol}//${apiHost}/api`;
    })();
    let currentAccessToken = null;
    let currentRefreshToken = null;
    let currentUser = null;

    /**
     * Toggle between login and register forms
     */
    function toggleAuthForm() {
      document.getElementById('login-form').classList.toggle('active');
      document.getElementById('register-form').classList.toggle('active');
      clearErrors();
    }

    /**
     * Clear error messages
     */
    function clearErrors() {
      document.getElementById('login-error').textContent = '';
      document.getElementById('register-error').textContent = '';
      document.getElementById('login-loading').textContent = '';
      document.getElementById('register-loading').textContent = '';
    }

    /**
     * Show error message
     */
    function showError(form, message) {
      const errorEl = document.getElementById(`${form}-error`);
      errorEl.textContent = message;
    }

    /**
     * Show loading message
     */
    function showLoading(form, message) {
      const loadingEl = document.getElementById(`${form}-loading`);
      loadingEl.innerHTML = message ? `<span class="loading-spinner"></span>${message}` : '';
    }

    /**
     * Handle login
     */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const rememberMe = document.getElementById('remember-me').checked;

      if (!username || !password) {
        showError('login', 'Username and password required');
        return;
      }

      showLoading('login', 'Logging in...');
      document.getElementById('login-submit').disabled = true;

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, rememberMe })
        });

        const data = await response.json();

        if (!response.ok) {
          showError('login', data.error || 'Login failed');
          return;
        }

        // Store tokens
        currentAccessToken = data.accessToken;
        currentRefreshToken = data.refreshToken;
        currentUser = data.user;

        // Save to localStorage for persistence
        localStorage.setItem('netrunner_access_token', currentAccessToken);
        localStorage.setItem('netrunner_refresh_token', currentRefreshToken);
        localStorage.setItem('netrunner_user', JSON.stringify(currentUser));

        showLoading('login', 'Loading game...');
        await loadGameAndStart();
      } catch (error) {
        showError('login', 'Connection error: ' + error.message);
      } finally {
        document.getElementById('login-submit').disabled = false;
      }
    });

    /**
     * Handle registration
     */
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const username = document.getElementById('register-username').value.trim();
      const password = document.getElementById('register-password').value;
      const passwordConfirm = document.getElementById('register-password-confirm').value;

      if (!username || !password || !passwordConfirm) {
        showError('register', 'All fields required');
        return;
      }

      if (username.length < 3 || username.length > 32) {
        showError('register', 'Username must be 3-32 characters');
        return;
      }

      if (password.length < 6) {
        showError('register', 'Password must be at least 6 characters');
        return;
      }

      if (password !== passwordConfirm) {
        showError('register', 'Passwords do not match');
        return;
      }

      showLoading('register', 'Creating account...');
      document.getElementById('register-submit').disabled = true;

      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showError('register', data.error || 'Registration failed');
          return;
        }

        // Store tokens
        currentAccessToken = data.accessToken;
        currentRefreshToken = data.refreshToken;
        currentUser = data.user;

        // Save to localStorage
        localStorage.setItem('netrunner_access_token', currentAccessToken);
        localStorage.setItem('netrunner_refresh_token', currentRefreshToken);
        localStorage.setItem('netrunner_user', JSON.stringify(currentUser));

        showLoading('register', 'Loading game...');
        await loadGameAndStart();
      } catch (error) {
        showError('register', 'Connection error: ' + error.message);
      } finally {
        document.getElementById('register-submit').disabled = false;
      }
    });

    /**
     * Load game and start it
     */
    async function loadGameAndStart() {
      // Redirect to main game page with auth token
      window.location.href = `/index.html?auth=${encodeURIComponent(currentAccessToken)}&user=${encodeURIComponent(JSON.stringify(currentUser))}`;
    }

    /**
     * Check if user is already logged in (on page load)
     */
    async function checkExistingLogin() {
      const savedToken = localStorage.getItem('netrunner_access_token');
      const savedUser = localStorage.getItem('netrunner_user');

      if (savedToken && savedUser) {
        try {
          // Verify token is still valid
          const response = await fetch(`${API_URL}/auth/me`, {
            headers: { 'Authorization': `Bearer ${savedToken}` }
          });

          if (response.ok) {
            currentAccessToken = savedToken;
            currentRefreshToken = localStorage.getItem('netrunner_refresh_token');
            currentUser = JSON.parse(savedUser);

            // Load game directly
            await loadGameAndStart();
          } else {
            // Token expired, try refresh
            const refreshToken = localStorage.getItem('netrunner_refresh_token');
            if (refreshToken) {
              await refreshAccessToken(refreshToken);
            }
          }
        } catch (error) {
          console.log('Existing login check failed:', error);
        }
      }
    }

    /**
     * Refresh access token
     */
    async function refreshAccessToken(refreshToken) {
      try {
        const response = await fetch(`${API_URL}/auth/refresh`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refreshToken })
        });

        const data = await response.json();

        if (response.ok && data.accessToken) {
          currentAccessToken = data.accessToken;
          localStorage.setItem('netrunner_access_token', currentAccessToken);
          await loadGameAndStart();
        }
      } catch (error) {
        console.log('Token refresh failed:', error);
      }
    }

    // Check for existing login on page load
    document.addEventListener('DOMContentLoaded', checkExistingLogin);
  </script>
</body>
</html>
